services:
  mysql:
    image: mysql:8.4
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root_password}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-agentic_sdlc}
      MYSQL_USER: ${MYSQL_USER:-agentic}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-agentic_password}
    ports:
      - "${MYSQL_HOST_PORT:-3306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./mysql/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 10

  chroma:
    image: chromadb/chroma:0.5.23
    ports:
      - "${CHROMA_HOST_PORT:-8001}:8000"
    volumes:
      - chroma_data:/chroma/chroma

  agent-service:
    build:
      context: ../src/agent-service
    environment:
      CHROMA_URL: http://chroma:8000
      DB_CONNECTION: server=mysql;port=3306;database=${MYSQL_DATABASE:-agentic_sdlc};user=${MYSQL_USER:-agentic};password=${MYSQL_PASSWORD:-agentic_password}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      LLM_PROVIDER: ${LLM_PROVIDER:-stub}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
    ports:
      - "${AGENT_HOST_PORT:-8000}:8000"
    depends_on:
      mysql:
        condition: service_healthy
      chroma:
        condition: service_started

  api:
    build:
      context: ../src/api/AgenticSdlc.Api
    environment:
      ASPNETCORE_URLS: http://+:8080
      AGENT_SERVICE_URL: http://agent-service:8000
      UI_ORIGIN: ${UI_ORIGIN:-http://localhost:5173}
      ConnectionStrings__Default: server=mysql;port=3306;database=${MYSQL_DATABASE:-agentic_sdlc};user=${MYSQL_USER:-agentic};password=${MYSQL_PASSWORD:-agentic_password}
    ports:
      - "${API_HOST_PORT:-8080}:8080"
    depends_on:
      mysql:
        condition: service_healthy
      agent-service:
        condition: service_started

  ui:
    build:
      context: ../src/ui/orchestrator-ui
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8080}
    ports:
      - "${UI_HOST_PORT:-5173}:5173"
    depends_on:
      api:
        condition: service_started

volumes:
  mysql_data:
  chroma_data:
